<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Raul Ardelean - Computer Science student targeting Software Engineering and Quantitative Finance." />
    <title>Raul Ardelean</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" id="site-header">
      <div class="header-inner">
        <a class="brand" href="#home" id="brand"></a>
        <nav class="site-nav" id="site-nav" aria-label="Primary navigation"></nav>
      </div>
    </header>

    <main>
      <!-- HERO -->
      <section class="hero" id="home">
        <div class="hero-inner">
          <p class="hero-eyebrow" id="hero-eyebrow"></p>
          <h1 class="hero-name" id="hero-name"></h1>
          <p class="hero-summary" id="hero-summary"></p>
          <div class="hero-targets" id="hero-targets"></div>
          <div class="hero-actions" id="hero-actions"></div>
        </div>
        <div class="hero-right">
          <div class="hero-photo-container">
            <img class="hero-photo" src="assets/profile-photo.webp" alt="Raul Ardelean" />
          </div>
        </div>
        <div class="hero-socials" id="hero-socials"></div>
      </section>

      <!-- JOURNEY -->
      <section class="section" id="journey">
        <p class="section-label">Journey</p>
        <div class="timeline" id="timeline"></div>
      </section>

      <!-- PROJECTS -->
      <section class="section" id="projects">
        <p class="section-label">Projects</p>
        <div class="projects-list" id="projects-list"></div>
      </section>

      <!-- SKILLS -->
      <section class="section" id="skills">
        <p class="section-label">Skills</p>
        <div class="skill-tags" id="skill-tags"></div>
      </section>

      <!-- CONTACT -->
      <section class="section" id="contact">
        <p class="section-label">Contact</p>
        <div class="contact-row" id="contact-links"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-copywriting">
          <p class="footer-name" id="footer-name"></p>
          <p class="footer-summary" id="footer-summary"></p>
        </div>
      </div>
      <p class="footer-copy" id="footer-copy"></p>
    </footer>

    <a class="scrollup" id="scrollup" href="#home" aria-label="Scroll to top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </a>

    <script src="script.js"></script>
  </body>
</html>
