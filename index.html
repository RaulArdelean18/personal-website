<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Raul Ardelean - Computer Science student targeting Software Engineering and Quantitative Finance." />
    <title>Raul Ardelean</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <script>
      (function () {
        if (localStorage.getItem("theme") === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" id="site-header">
      <div class="header-inner">
        <a class="brand" href="#home" id="brand"></a>
        <div class="header-controls">
          <nav class="site-nav" id="site-nav" aria-label="Primary navigation"></nav>
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to light theme">
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"></circle>
              <line x1="12" y1="2" x2="12" y2="4"></line>
              <line x1="12" y1="20" x2="12" y2="22"></line>
              <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line>
              <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line>
              <line x1="2" y1="12" x2="4" y2="12"></line>
              <line x1="20" y1="12" x2="22" y2="12"></line>
              <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line>
              <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line>
            </svg>
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"></path>
            </svg>
          </button>
          <button class="menu-toggle" id="menu-toggle" type="button" aria-label="Open navigation menu" aria-controls="site-nav" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <!-- HERO -->
      <section class="hero" id="home">
        <div class="hero-inner">
          <p class="hero-eyebrow" id="hero-eyebrow"></p>
          <h1 class="hero-name" id="hero-name"></h1>
          <p class="hero-summary" id="hero-summary"></p>
          <div class="hero-targets" id="hero-targets"></div>
          <div class="hero-actions" id="hero-actions"></div>
        </div>
        <div class="hero-right">
          <div class="hero-photo-container">
            <img class="hero-photo" src="assets/profile-photo.webp" alt="Raul Ardelean" />
          </div>
        </div>
        <div class="hero-socials" id="hero-socials"></div>
      </section>

      <!-- JOURNEY -->
      <section class="section" id="journey">
        <h2 class="section-label">Journey</h2>
        <div class="timeline" id="timeline"></div>
      </section>

      <!-- PROJECTS -->
      <section class="section" id="projects">
        <h2 class="section-label">Projects</h2>
        <div class="projects-list" id="projects-list"></div>
      </section>

      <!-- SKILLS -->
      <section class="section" id="skills">
        <h2 class="section-label">Skills</h2>
        <div class="skill-tags" id="skill-tags"></div>
      </section>

      <!-- CONTACT -->
      <section class="section" id="contact">
        <h2 class="section-label">Contact</h2>
        <div class="contact-row" id="contact-links"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-copywriting">
          <p class="footer-name" id="footer-name"></p>
          <p class="footer-summary" id="footer-summary"></p>
        </div>
      </div>
      <p class="footer-copy" id="footer-copy"></p>
    </footer>

    <a class="scrollup" id="scrollup" href="#home" aria-label="Scroll to top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </a>

    <script src="script.js"></script>
  </body>
</html>
